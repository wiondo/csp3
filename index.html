<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Diary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="browser-frame">
    <div class="browser-top">
      <span class="circle"></span>
      <span class="circle"></span>
      <span class="circle"></span>
    </div>

    <main class="page">
      <header class="page-header">
        <h1>food diary</h1>
        <p class="subtitle">
          당신이 먹고 싶은 음식을 1주일 단위로 정해두고 왜 먹고 싶은지,
          <br>
          그날의 기분이 어땠는지 당신의 메모장을 채워보세요!!
        </p>
      </header>

      <section class="content-area">
        <div class="left-area">
          <section class="notebook">
            <div class="left-page">
              <h2 class="day-title" id="day-title">월</h2>
              <div class="food-memo-area">
                <textarea id="food-note" placeholder="오늘 먹고 싶은 음식을 적어보세요."></textarea>
              </div>
            </div>

            <div class="right-page">
              <div class="memo-label">메모</div>
              <div class="diary-area">
                <textarea id="diary-note" placeholder="그날의 기분이나 왜 이 음식이 먹고 싶었는지 적어보세요."></textarea>
              </div>
            </div>
          </section>

          <nav class="page-buttons">
            <button type="button" id="back-btn">back</button>
            <button type="button" id="next-btn">Next</button>
          </nav>
        </div>

        <aside class="search-panel">
          <div class="search-box">
            <label for="food-search" class="search-label">food search</label>
            <div class="search-input-row">
              <input type="text" id="food-search" placeholder="음식을 검색하세요">
              <button type="button" id="search-btn">search</button>
            </div>
          </div>

          <div class="result-box">
            <div class="result-item">
              <h3>recipe</h3>
              <div id="recipe-box"></div>
            </div>

            <div class="result-item">
              <h3>ingredient</h3>
              <div id="ingredient-box"></div>
            </div>

            <div class="result-item">
              <h3>national</h3>
              <div id="national-box"></div>
            </div>
          </div>
        </aside>
      </section>

      <footer class="api-footer">
        Recipe data from TheMealDB API
      </footer>
    </main>
  </div>

  <script src="index.js"></script>
</body>
</html>
